name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.1"
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build

      - name: Install html-proofer
        run: gem install html-proofer

      - name: Check HTML
        run: |
          htmlproofer _site \
            --ignore-urls "/fonts.googleapis.com/,/fonts.gstatic.com/" \
            --no-enforce-https \
            --disable-external
