---
layout: default
---

<header class="post-header">
  <div class="content-container">
    <span class="post-header-meta">{{ page.date | date: '%B %d, %Y' }}</span>
    <h1>{{ page.title }}</h1>
  </div>
</header>

<article class="post-body">
  <div class="content-container">
    {{ content }}
  </div>

  <nav class="post-nav">
    <div class="content-container">
      <a href="/jobs">&larr; Back to jobs</a>
    </div>
  </nav>
</article>
